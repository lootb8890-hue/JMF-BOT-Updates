<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0b0f19">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>JMF BOT | الاتصال السحابي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --bg: #000000; --panel: #0a0e17; --primary: #00d4ff; --secondary: #0088ff;
            --text-main: #ffffff; --text-dim: #94a3b8; --border: rgba(0, 212, 255, 0.15);
        }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; background: var(--bg); color: var(--text-main); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;
            overscroll-behavior-y: contain;
        }
        .container {
            background: var(--panel); border: 1px solid var(--border); border-radius: 20px;
            padding: 30px 20px; width: 90%; max-width: 400px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .logo-box {
            width: 80px; height: 80px; background: rgba(0, 212, 255, 0.1); border-radius: 20px;
            display: flex; align-items: center; justify-content: center; margin: 0 auto 20px auto;
            border: 1px solid var(--border);
        }
        .logo-box svg { width: 40px; height: 40px; color: var(--primary); }
        h1 { font-size: 22px; margin: 0 0 10px 0; color: #fff; }
        p { font-size: 13px; color: var(--text-muted); margin: 0 0 25px 0; }
        #input-view, #waiting-view { display: none; }
        input {
            width: 100%; background: rgba(0,0,0,0.4); border: 1px solid #334155; color: #fff;
            padding: 15px; border-radius: 12px; font-size: 16px; text-align: center; outline: none; margin-bottom: 20px;
        }
        .btn {
            width: 100%; padding: 16px; border-radius: 12px; border: none; font-size: 16px; font-weight: 800; color: #000;
            cursor: pointer; background: linear-gradient(to right, var(--primary), var(--secondary));
        }
        .pulse-loader {
            width: 60px; height: 60px; background: var(--primary); border-radius: 50%;
            margin: 20px auto; animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 212, 255, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(0, 212, 255, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 212, 255, 0); }
        }
        .footer { margin-top: 30px; font-size: 11px; color: #64748b; }
        
        /* Internal Chat Modal */
        #chat-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 7, 10, 0.95); z-index: 3000000;
            display: none; flex-direction: column; animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .chat-container {
            flex: 1; display: flex; flex-direction: column; max-width: 500px;
            margin: 0 auto; width: 100%; background: var(--panel);
            border-left: 1px solid var(--border); border-right: 1px solid var(--border);
        }
        .chat-header {
            padding: 15px 20px; background: rgba(0, 212, 255, 0.1);
            border-bottom: 1px solid var(--border); display: flex;
            justify-content: space-between; align-items: center;
        }
        #dashboard-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 99999; background: var(--bg); }
        #dashboard-view iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <div id="login-screen" style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; width: 100%;">
        <div class="container">
            <div class="logo-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                    <line x1="8" y1="21" x2="16" y2="21"></line>
                    <line x1="12" y1="17" x2="12" y2="21"></line>
                </svg>
            </div>
            <div id="input-view" style="display:none;">
                <h1>أهلاً بك في JMF <span style="font-size:10px; opacity:0.5;">v0.4.4</span></h1>
                <p>يرجى إدخال معرف الجهاز أو مسح الكود.</p>
                <div style="position:relative; width:100%; margin-bottom:20px;">
                    <input type="text" id="acc-input" placeholder="ID الجهاز (مثال: a1b2c3d4)" style="margin-bottom:0; padding-right:50px;">
                    <div onclick="startScanner()" style="position:absolute; right:15px; top:50%; transform:translateY(-50%); color:var(--primary); cursor:pointer;">
                        <i data-lucide="qr-code"></i>
                    </div>
                </div>
                <button class="btn" onclick="saveAndConnect()">الاتصال السحابي الآمن</button>
                <div id="scanner-container" style="display:none; margin-top:20px; border-radius:15px; overflow:hidden; border:2px solid var(--primary);">
                    <div id="reader" style="width:100%;"></div>
                    <button class="btn" onclick="stopScanner()" style="background:#ef4444; border-radius:0;">إلغاء المسح</button>
                </div>
            </div>
            <div id="waiting-view">
                <h1>بانتظار تشغيل البوت..</h1>
                <div class="pulse-loader"></div>
                <p>يرجى تشغيل تطبيق JMF BOT على حاسوبك.</p>
                <div style="margin-top:20px; display:flex; flex-direction:column; gap:10px;">
                    <a href="#" style="color:var(--primary); font-size:12px;" onclick="logout()">تغيير معرف الجهاز</a>
                    <button class="btn" style="background:#1e293b; font-size:12px; padding:10px;" onclick="promptManualLink()">ربط يدوي (رابط Cloudflare)</button>
                </div>
                <button id="pwa-install-btn" class="btn" style="display:none; margin-top:20px; background: #1e293b; color: #fff; border: 1px solid var(--primary);">تثبيت التطبيق</button>
            </div>
        </div>
        <div class="footer">JMF Cloud Connect &copy; 2026</div>
    </div>

    <div id="dashboard-view"></div>

    <script>
        const LIC_URL = "https://jmf-bot-default-rtdb.firebaseio.com/licenses";
        const DEV_URL = "https://jmf-bot-default-rtdb.firebaseio.com/devices";
        
        let deferredPrompt;
        const installBtn = document.getElementById('pwa-install-btn');
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js'); });
        }
        let retryInterval = null;


        async function checkConnection(devId) {
            try {
                // 1. Intelligent ID Resolution (Find full HWID from partial or serial)
                let resolvedHwid = devId;
                
                // Search in Devices
                const devAllRes = await fetch(`${DEV_URL}.json`, { cache: "no-store" });
                const devAllData = await devAllRes.json();
                if(devAllData) {
                    for(let hwid in devAllData) {
                        if(hwid.startsWith(devId)) { resolvedHwid = hwid; break; }
                    }
                }

                // If still not sure, search in Licenses
                if(resolvedHwid === devId) {
                    const licAllRes = await fetch(`${LIC_URL}.json`, { cache: "no-store" });
                    const licAllData = await licAllRes.json();
                    if(licAllData) {
                        if(licAllData[devId] && licAllData[devId].device_id) {
                            resolvedHwid = licAllData[devId].device_id;
                        } else {
                            for(let s in licAllData) {
                                if(licAllData[s].device_id && licAllData[s].device_id.startsWith(devId)) {
                                    resolvedHwid = licAllData[s].device_id; break;
                                }
                            }
                        }
                    }
                }

                const targetHwid = resolvedHwid;

                // 2. Fetch Connection URL from resolved HWID
                const devRes = await fetch(`${DEV_URL}/${targetHwid}.json`, { cache: "no-store" });
                const devData = await devRes.json();

                if(devData && devData.url) {
                    try {
                        await fetch(devData.url, { mode: 'no-cors' });
                        const cacheBuster = Date.now();
                        const dashView = document.getElementById('dashboard-view');
                        dashView.innerHTML = `<iframe id="dash-frame" src="${devData.url}?v=${cacheBuster}" style="width:100%; height:100%; border:none;"></iframe>`;
                        dashView.style.display = 'block';
                        document.getElementById('login-screen').style.display = 'none';
                        
                        // Force touch capture for the chart
                        const frame = document.getElementById('dash-frame');
                        frame.onload = () => {
                            frame.contentWindow.focus();
                        };
                        
                        if(retryInterval) clearInterval(retryInterval);
                        return true;
                    } catch (e) {}
                }
            } catch (e) {}
            return false;
        }

        function saveAndConnect() {
            const devId = document.getElementById('acc-input').value.trim();
            if(!devId) return;
            localStorage.setItem('jmf_dev_id', devId);
            startWaiting(devId);
        }

        function startWaiting(devId) {
            document.getElementById('input-view').style.display = 'none';
            document.getElementById('waiting-view').style.display = 'block';
            checkConnection(devId);
            retryInterval = setInterval(() => checkConnection(devId), 5000);
        }

        function logout() { localStorage.removeItem('jmf_dev_id'); location.reload(); }

        function promptManualLink() {
            const url = prompt("يرجى إدخال رابط Cloudflare (مثال: https://xxx.trycloudflare.com)");
            if(url && url.startsWith('http')) {
                const cacheBuster = Date.now();
                const dashView = document.getElementById('dashboard-view');
                dashView.innerHTML = `<iframe id="dash-frame" src="${url}?v=${cacheBuster}" style="width:100%; height:100%; border:none;"></iframe>`;
                dashView.style.display = 'block';
                document.getElementById('login-screen').style.display = 'none';
                if(retryInterval) clearInterval(retryInterval);
            }
        }

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const devParam = urlParams.get('dev');
            if(devParam) {
                localStorage.setItem('jmf_dev_id', devParam);
                // Clean URL
                window.history.replaceState({}, document.title, window.location.pathname);
            }

            const savedId = localStorage.getItem('jmf_dev_id');
            if (savedId) startWaiting(savedId);
            else document.getElementById('input-view').style.display = 'block';
            lucide.createIcons();
        };

        let html5QrCode = null;
        function startScanner() {
            document.getElementById('scanner-container').style.display = 'block';
            html5QrCode = new Html5Qrcode("reader");
            const qrCodeSuccessCallback = (decodedText, decodedResult) => {
                let id = decodedText;
                if(id.includes('dev=')) {
                    id = id.split('dev=')[1].split('&')[0];
                }
                document.getElementById('acc-input').value = id;
                stopScanner();
                saveAndConnect();
            };
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            html5QrCode.start({ facingMode: "environment" }, config, qrCodeSuccessCallback);
        }

        function stopScanner() {
            if(html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('scanner-container').style.display = 'none';
                });
            }
        }
    </script>
</body>
</html>
